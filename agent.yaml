spec_version: "0.1.0"
name: security-audit-agent
version: 1.1.0
description: >
  AI security engineer that audits code for OWASP Top 10 vulnerabilities,
  detects hardcoded secrets and credentials, scans dependency files for
  known CVEs, and performs full codebase scans on local directories or
  GitHub repository URLs. Delivers structured findings with severity,
  exact location, and a concrete fix — not vague warnings.
author: jay-shah
license: MIT
model:
  preferred: claude-opus-4-6
  fallback:
    - claude-sonnet-4-6
    - claude-haiku-4-5-20251001
  constraints:
    temperature: 0.1
    max_tokens: 8192
skills:
  - codebase-scanner
  - owasp-scanner
  - secrets-detector
  - dep-auditor
runtime:
  max_turns: 80
  timeout: 600
tags:
  - security
  - owasp
  - vulnerability-scanning
  - codebase-audit
  - github-scanning
  - developer-tools
